services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novelark}
      POSTGRES_USER: ${POSTGRES_USER:-novelark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novelark_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novelark} -d ${POSTGRES_DB:-novelark}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-novelark}:${POSTGRES_PASSWORD:-novelark_password}@db:5432/${POSTGRES_DB:-novelark}?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
      ADMIN_SESSION_DAYS: ${ADMIN_SESSION_DAYS:-7}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      READER_SESSION_DAYS: ${READER_SESSION_DAYS:-30}
      READER_COOKIE_SECURE: ${READER_COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@novelark.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      RESET_ADMIN_PASSWORD: ${RESET_ADMIN_PASSWORD:-false}
      LOCAL_ASSET_BASE_PATH: /app/storage/covers
      PUBLIC_COVER_BASE_URL: /covers
      SOURCE_BASE_URL: https://goodluckark.com
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY:-4}
      CRAWLER_DELAY_MS: ${CRAWLER_DELAY_MS:-250}
      CRAWLER_TIMEOUT_MS: ${CRAWLER_TIMEOUT_MS:-30000}
      CRAWLER_RETRIES: ${CRAWLER_RETRIES:-3}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./storage/covers:/app/storage/covers
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://api:4000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://api:4000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
